name: Sync Image to My DockerHub

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull and Push
        run: |
          docker pull platane/snk:latest
          docker tag platane/snk:latest ${{ secrets.DOCKER_USERNAME }}/snake:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/snake:latest
          
