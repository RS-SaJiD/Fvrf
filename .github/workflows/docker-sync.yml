name: Sync Image to My DockerHub

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull and Push
        run: |
          docker pull your-username/snake:latest
          docker tag robinsonsajid/snake:latest robinsonsajid/snake:v1.0.0
          docker push your-username/snake:v1.0.0
